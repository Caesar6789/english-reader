var TEXT_UNITS = [{"unit": "Welcome Unit", "sentences": [{"en": "So this is it—senior high school at last!", "zh": "终于到这一步了 —— 我终于上高中了！"}, {"en": "I’m not outgoing so I’m a little anxious right now.", "zh": "我性格不算外向，所以此刻有点忐忑。"}, {"en": "I want to make a good first impression.", "zh": "我想给大家留下一个好的第一印象。"}, {"en": "Will I make any friends?", "zh": "我能交到朋友吗？"}, {"en": "What if no one talks to me?", "zh": "要是没人主动和我说话该怎么办？"}, {"en": "7:00 a.m.", "zh": "早上七点"}, {"en": "The class was difficult, but the teacher was kind and friendly.", "zh": "课程很难，但老师和蔼又友善。"}, {"en": "He even told us a funny story, and everyone laughed so much!", "zh": "他还给我们讲了一个有趣的故事，所有人都笑得特别开心！"}, {"en": "I found most of my classmates and teachers friendly and helpful.", "zh": "我发现班里大多数同学和老师都很友善、乐于助人。"}, {"en": "12:30 p.m.", "zh": "中午十二点半"}, {"en": "The lab is new and the lesson was great, but the guy next to me tried to talk to me the whole time.", "zh": "实验室是新建的，课也很不错，可坐在我旁边的男生全程都在和我搭话。"}, {"en": "I couldn’t concentrate on the experiment.", "zh": "我根本没法专心做实验。"}, {"en": "I really wanted to tell him to please be quiet and leave me alone!", "zh": "我真想告诉他安静一点，别打扰我！"}, {"en": "10:29 p.m.", "zh": "晚上十点二十九分"}, {"en": "This morning, I was worried that no one would talk to me.", "zh": "早上我还担心没人愿意和我说话。"}, {"en": "But I was wrong.", "zh": "但我想错了。"}, {"en": "I didn’t feel awkward or frightened at all.", "zh": "我一点也不尴尬，也不害怕了。"}, {"en": "I miss my friends from junior high school, but I believe I will make new friends here, and there’s a lot to explore at senior high.", "zh": "我很想念初中的朋友们，但我相信我能在这里交到新朋友，高中还有很多新鲜事物等着我去探索。"}, {"en": "I feel much more confident than I felt this morning.", "zh": "比起早上，我现在自信多了。"}, {"en": "I think that tomorrow will be a great day!", "zh": "我想，明天一定会很美好！"}]}, {"unit": "Unit 1 Teenage Life", "sentences": [{"en": "Hi! My name is Adam and I’m a freshman at senior high school.", "zh": "大家好！我叫亚当，是一名高一新生。"}, {"en": "Going from junior high school to senior high school is a really big challenge.", "zh": "从初中升入高中真的是一项巨大的挑战。"}, {"en": "The first week was a little confusing.", "zh": "开学第一周我还有点不知所措。"}, {"en": "First, I had to think very carefully about which courses I wanted to take.", "zh": "首先，我得仔细考虑自己要选哪些课程。"}, {"en": "The school adviser helped me choose the suitable ones: maths, English, chemistry, world history, and Chinese.", "zh": "学校的指导老师帮我挑选了合适的科目：数学、英语、化学、世界历史和语文。"}, {"en": "I know that Chinese is a very difficult language, but I hope to be fluent when I graduate.", "zh": "我知道中文很难学，但我希望毕业时能说得流利。"}, {"en": "My adviser recommended that I should sign up for advanced literature because I like English and I’m good at it.", "zh": "指导老师建议我报名高级文学课，因为我喜欢英语，而且学得不错。"}, {"en": "I had to choose extra-curricular activities, too.", "zh": "我还得挑选课外活动。"}, {"en": "I tried to join the school football team, but the coach told me that I didn’t play well enough.", "zh": "我尝试进校足球队，但教练说我的球技还不够好。"}, {"en": "Obviously, I was unhappy, but I won’t quit.", "zh": "我当然很失落，但我不会就此放弃。"}, {"en": "I’ll find a way to improve on my own so that I can make the team next year.", "zh": "我会自己想办法提升球技，争取明年入选球队。"}, {"en": "I joined a volunteer club instead.", "zh": "于是我加入了志愿者社团。"}, {"en": "Every Wednesday, we work at a soup kitchen and hand out food to homeless people in the community.", "zh": "每周三，我们会在救济食堂帮忙，给社区里无家可归的人分发食物。"}, {"en": "I know I’ll have to study harder as a senior high school student and get used to being responsible for a lot more.", "zh": "我清楚，作为高中生我必须更加努力学习，还要习惯承担更多责任。"}, {"en": "I’m a bit worried about keeping up with the other students in my advanced course, and it’ll be quite difficult to get used to all the homework.", "zh": "我有点担心跟不上高级班其他同学的进度，而且要适应海量作业也很难。"}, {"en": "Still, I’m happy to be here.", "zh": "尽管如此，我还是很庆幸来到这里。"}, {"en": "Studying hard isn’t always fun, but I’ll be well prepared for university or whatever else comes in the future.", "zh": "刻苦学习并不总是轻松有趣，但这会让我为大学、以及未来所有未知的挑战做好充分准备。"}]}, {"unit": "Unit 2 Travelling Around", "sentences": [{"en": "Text 1 About Peru", "zh": ""}, {"en": "Peru is a country on the Pacific coast of South America with three main areas: narrow, dry, flat land running along the coast, the Andes Mountains, and the Amazon rainforest.", "zh": "秘鲁是南美洲太平洋沿岸的国家，国土分为三大区域：沿海狭长干旱的平原、安第斯山脉以及亚马孙雨林。"}, {"en": "In the 1400s and 1500s, Peru was the centre of the powerful ancient Inca Empire.", "zh": "十五、十六世纪，秘鲁是强盛的古印加帝国的中心。"}, {"en": "The Inca emperor lived in the now-famous site Machu Picchu.", "zh": "印加帝王居住在如今闻名世界的马丘比丘遗址。"}, {"en": "Spain took control of Peru in the 16th century and ruled until 1821.", "zh": "十六世纪西班牙占领秘鲁，并统治至 1821 年。"}, {"en": "It is for this reason that Spanish is the main official language of Peru.", "zh": "正因如此，西班牙语成为秘鲁的主要官方语言。"}, {"en": "Text 2 Machu Picchu Tour", "zh": ""}, {"en": "This four-day walking tour will take you on amazing paths through the Andes Mountains on the way to the city of Machu Picchu.", "zh": "这场四天徒步之旅将带你沿着绝美的山道穿越安第斯山脉，前往马丘比丘古城。"}, {"en": "After reaching your destination, you will have a day to explore and be amazed by this ancient city.", "zh": "抵达目的地后，你将拥有一整天时间游览这座古城，为之震撼。"}, {"en": "Especially amazing is the Incas’ dry stone method of building.", "zh": "最令人惊叹的是印加人的干石建筑工艺。"}, {"en": "Inca builders cut stones to exact sizes so that nothing was needed to hold walls together other than the perfect fit of the stones.", "zh": "印加工匠将石块切割成精准尺寸，仅凭石块之间严丝合缝的咬合就能搭建墙体，无需任何粘合材料。"}, {"en": "Text 3 Amazon Rainforest Tour", "zh": ""}, {"en": "This four-day tour will take you from the Andes into the Amazon rainforest.", "zh": "这场四日之旅将带你从安第斯山脉深入亚马孙雨林。"}, {"en": "From Cusco, you’ll fly one day to the rainforest.", "zh": "从库斯科出发，你将搭乘一日航班抵达雨林。"}, {"en": "Then you’ll spend one day travelling by boat to your accommodation in the middle of the forest.", "zh": "之后乘船航行一天，抵达雨林深处的住宿点。"}, {"en": "You can then spend three days exploring the rainforest with a local guide and enjoying the plants and animals unique to the rainforest.", "zh": "接下来的三天，你可以跟随当地向导探索雨林，欣赏这里独有的动植物。"}, {"en": "So come and experience what Peru has to offer: everything from the ancient Inca culture and centuries-old Spanish villages to deep rainforests, high mountains, and a beautiful coastline.", "zh": "快来感受秘鲁的万般风情：从古印加文明、百年西班牙古村落，到幽深雨林、巍峨群山与绝美海岸线，应有尽有。"}, {"en": "For more brochures about other package tours around Peru, contact us at tourinfo@travelperu.org.", "zh": "如需更多秘鲁其他跟团旅行宣传册，请发送邮件至tourinfo@travelperu.org联系我们。"}]}, {"unit": "Unit 3 Sports and Fitness", "sentences": [{"en": "Text 1 Lang Ping", "zh": ""}, {"en": "As a player, Lang Ping brought honour and glory to her country.", "zh": "运动员时期，郎平为祖国赢得无数荣誉与荣光。"}, {"en": "As a coach, she led the China women’s volleyball team to medals at world championships and the Olympics.", "zh": "执教期间，她带领中国女排斩获世锦赛与奥运会奖牌。"}, {"en": "As a person, Lang Ping is loved by fans at home and abroad.", "zh": "作为普通人，郎平深受海内外球迷喜爱。"}, {"en": "When the Chinese team was preparing for the 2015 World Cup, her determination was tested.", "zh": "2015 年中国女排备战世界杯时，她的意志迎来了严峻考验。"}, {"en": "The team that Lang Ping had built was falling apart.", "zh": "郎平一手打造的队伍濒临分崩离析。"}, {"en": "Two players left because of injuries.", "zh": "两名队员因伤病离队。"}, {"en": "Losing two important players was a big challenge, but Lang Ping did not lose heart.", "zh": "失去两名主力是巨大打击，但郎平没有灰心。"}, {"en": "She had to find a new team quickly, and train them hard for the World Cup.", "zh": "她必须迅速组建全新队伍，为世界杯刻苦训练。"}, {"en": "One year later, at the Rio Olympics, the Chinese team faced some of the strongest teams in the world.", "zh": "一年后的里约奥运会，中国女排迎战世界顶尖强队。"}, {"en": "They fought together and won the gold medal.", "zh": "全队齐心协力，最终拿下金牌。"}, {"en": "Lang Ping’s ability to motivate young players and build a strong team made her a living legend.", "zh": "郎平善于激励年轻队员、打造强队的能力，让她成为一代传奇。"}, {"en": "Text 2 Michael Jordan", "zh": ""}, {"en": "Millions of people around the world love basketball, and many of them admire Michael Jordan.", "zh": "全球数百万篮球爱好者，大多都崇拜迈克尔・乔丹。"}, {"en": "He is known as Air Jordan for his amazing ability to jump high and score.", "zh": "他因惊人的弹跳与得分能力，被称为 “飞人乔丹”。"}, {"en": "Jordan’s career was full of challenges.", "zh": "乔丹的职业生涯布满坎坷。"}, {"en": "He lost many games and many championships.", "zh": "他输掉过无数比赛，错失过多次冠军。"}, {"en": "But he never gave up.", "zh": "但他从未放弃。"}, {"en": "He worked harder than anyone else, and learned from his failures.", "zh": "他比所有人都刻苦，并从失败中吸取教训。"}, {"en": "His mental strength was as important as his physical talent.", "zh": "他强大的意志力，和出众的身体素质同等重要。"}, {"en": "Jordan says, “I’ve missed more than 9,000 shots in my career.", "zh": "乔丹曾说：“我的职业生涯中投失了九千多次球。"}, {"en": "I’ve lost almost 300 games.", "zh": "我输掉过近三百场比赛。"}, {"en": "Twenty-six times, I’ve been trusted to take the game-winning shot and missed.", "zh": "有二十六次，全队把绝杀的机会交给我，我却投丢了。"}, {"en": "I’ve failed over and over and over again in my life.", "zh": "我的人生里，失败一次又一次接踵而至。"}, {"en": "And that is why I succeed.”", "zh": "但恰恰是这些失败，成就了今天的我。”"}, {"en": "His spirit of never giving up has inspired people all over the world.", "zh": "他永不言弃的精神，激励了全世界无数人。"}]}, {"unit": "Unit 4 Natural Disasters", "sentences": [{"en": "Strange things were happening in the countryside of northeast Hebei.", "zh": "河北东北部的农村，接连出现各种怪事。"}, {"en": "For three days the water in the village wells rose and fell, rose and fell.", "zh": "连续三天，村里井水涨了又落，落了又涨。"}, {"en": "Farmers noticed that the well walls had deep cracks in them.", "zh": "村民发现井壁出现深深的裂缝。"}, {"en": "A smelly gas came out of the cracks.", "zh": "裂缝里冒出刺鼻的异味。"}, {"en": "In the farmyards, the chickens and even the pigs were too nervous to eat.", "zh": "农家院子里，鸡甚至猪都焦躁不安，不肯进食。"}, {"en": "Mice ran out of the fields looking for places to hide.", "zh": "老鼠纷纷从田里逃窜，四处寻找藏身之处。"}, {"en": "Fish jumped out of their bowls and ponds.", "zh": "鱼儿纷纷从鱼缸、池塘里跃出水面。"}, {"en": "At about 3:00 am on July 28, 1976, some people saw bright lights in the sky.", "zh": "1976 年 7 月 28 日凌晨三点左右，有人看见天空出现刺眼亮光。"}, {"en": "The sound of planes could be heard outside the city of Tangshan even when no planes were in the sky.", "zh": "唐山城外传来飞机轰鸣，天上却没有任何飞机。"}, {"en": "In the city, the water pipes in some buildings cracked and burst.", "zh": "城内部分楼房的水管炸裂漏水。"}, {"en": "But the one million people of the city, who thought little of these events, were asleep as usual that night.", "zh": "可这座百万人口城市的居民，丝毫没把这些异象放在心上，当晚照常入睡。"}, {"en": "At 3:42 am everything began to shake.", "zh": "凌晨三点四十二分，大地开始剧烈震颤。"}, {"en": "It seemed as if the world were coming to an end!", "zh": "仿佛世界末日来临！"}, {"en": "Eleven kilometres directly below the city one of the biggest earthquakes of the 20th century had begun.", "zh": "城市正下方十一公里处，爆发了二十世纪最严重的大地震之一。"}, {"en": "A huge crack that was eight kilometres long and thirty metres wide cut across houses, roads and canals.", "zh": "一道八公里长、三十米宽的巨大裂缝撕裂房屋、道路与水渠。"}, {"en": "Steam burst from holes in the ground.", "zh": "地面孔洞中喷涌而出滚滚蒸汽。"}, {"en": "Hard hills of rock became rivers of dirt.", "zh": "坚硬的石山瞬间化作泥沙洪流。"}, {"en": "In fifteen terrible seconds a large city lay in ruins.", "zh": "短短可怕的十五秒，一座大城市沦为废墟。"}, {"en": "The suffering of the people was extreme.", "zh": "百姓承受着无尽苦难。"}, {"en": "Two-thirds of them died or were injured during the earthquake.", "zh": "三分之二的居民在地震中伤亡。"}, {"en": "Thousands of families were killed and many children were left without parents.", "zh": "成千上万个家庭支离破碎，无数孩子沦为孤儿。"}, {"en": "The number of people who were killed or missing reached more than 400,000.", "zh": "遇难与失踪人数超四十万。"}, {"en": "Everywhere survivors looked, there was nothing but ruins.", "zh": "幸存者放眼望去，满目疮痍。"}, {"en": "Nearly everything had been destroyed.", "zh": "几乎所有事物都毁于一旦。"}, {"en": "All of the city’s hospitals, 75% of its factories and buildings and 90% of its homes were gone.", "zh": "城内全部医院、七成五的厂房建筑、九成住宅全部坍塌。"}, {"en": "Bricks covered the ground like red autumn leaves.", "zh": "红砖碎瓦铺满地面，如同秋日红叶。"}, {"en": "No wind, however, could blow them away.", "zh": "却没有风能将它们吹散。"}, {"en": "Two dams fell and most of the bridges also fell or were not safe for travelling.", "zh": "两座大坝溃塌，大部分桥梁断裂，无法通行。"}, {"en": "The railway tracks were now useless pieces of steel.", "zh": "铁轨扭曲变形，沦为废铁。"}, {"en": "Tens of thousands of cows would never give milk again.", "zh": "成千上万的奶牛再也无法产奶。"}, {"en": "Half a million pigs and millions of chickens were dead.", "zh": "五十万头猪、数百万只鸡全部丧生。"}, {"en": "Sand now filled the wells instead of water.", "zh": "井水被泥沙填满。"}, {"en": "People were shocked.", "zh": "所有人都陷入绝望震惊。"}, {"en": "Then, later that afternoon, another big quake which was almost as strong as the first one shook Tangshan.", "zh": "当天下午晚些时候，一场强度几乎和主震相当的余震再次袭击唐山。"}, {"en": "Some of the rescue workers and doctors were trapped under the ruins.", "zh": "部分救援人员与医生被困废墟之下。"}, {"en": "More buildings fell down.", "zh": "更多房屋二次坍塌。"}, {"en": "Water, food, and electricity were hard to get.", "zh": "饮水、食物、电力全部短缺。"}, {"en": "People began to wonder how long the disaster would last.", "zh": "人们不知道这场灾难还要持续多久。"}, {"en": "All hope was not lost.", "zh": "希望并未彻底破灭。"}, {"en": "Soon after the quakes, the army sent 150,000 soldiers to Tangshan to dig out those who were trapped and to bury the dead.", "zh": "地震发生后不久，十万五千名解放军奔赴唐山，搜救被困群众、安葬遇难者。"}, {"en": "More than 10,000 doctors and nurses came to provide medical care.", "zh": "上万名医护人员赶来开展救治工作。"}, {"en": "Workers built shelters for survivors whose homes had been destroyed.", "zh": "工人为无家可归的幸存者搭建临时安置棚。"}, {"en": "Fresh water was taken to the city by train, truck and plane.", "zh": "火车、卡车、飞机源源不断向灾区运送淡水。"}, {"en": "Slowly, the city began to breathe again.", "zh": "这座城市，慢慢重获生机。"}]}, {"unit": "Unit 5 Languages Around the World", "sentences": [{"en": "China is widely known for its ancient civilisation which has continued all the way through into modern times, despite the many ups and downs in its history.", "zh": "中华文明源远流长，历经历史沉浮却从未中断，举世闻名。"}, {"en": "There are many reasons why this has been possible, but one of the main factors has been the Chinese writing system.", "zh": "能延续至今有诸多原因，汉字书写体系是核心因素之一。"}, {"en": "At the beginning, written Chinese was a picture-based language.", "zh": "最初，汉字是象形文字。"}, {"en": "It dates back several thousand years to the use of longgu—animal bones and shells on which symbols were carved by ancient Chinese people.", "zh": "汉字的起源可追溯至数千年前的甲骨 —— 古人在兽骨、龟甲上镌刻符号记事。"}, {"en": "Some of the ancient symbols can still be seen in today’s hanzi.", "zh": "部分古老的象形符号，如今仍能在汉字中找到痕迹。"}, {"en": "By the Shang Dynasty (around 1600–1046 BCE), these symbols had become a well-developed writing system.", "zh": "到商代（约公元前 1600 至 1046 年），这些符号已经发展成成熟完整的文字体系。"}, {"en": "Over the years, the system developed into different forms, as it was a time when people were divided geographically, leading to many varieties of dialects and characters.", "zh": "岁月流转，各地地域隔绝，文字衍生出多种形态，方言与异体字层出不穷。"}, {"en": "This, however, changed under Emperor Qinshihuang of the Qin Dynasty (221–207 BCE).", "zh": "但秦朝（公元前 221-207 年）秦始皇统一六国后，这一局面彻底改变。"}, {"en": "Emperor Qinshihuang united the seven major states into one unified country where the Chinese writing system began to develop in one direction.", "zh": "秦始皇将七国统一为一个完整王朝，汉字自此朝着统一的方向发展。"}, {"en": "That writing system was of great importance in uniting the Chinese people and culture.", "zh": "这套统一的文字体系，对凝聚华夏民族、传承中华文化起到至关重要的作用。"}, {"en": "Even today, no matter where Chinese people live or what dialect they speak, they can all still communicate in writing.", "zh": "时至今日，无论华人身居何方、说着何种方言，都能依靠文字无障碍沟通。"}, {"en": "Written Chinese has also become an important means by which China’s present is connected with its past.", "zh": "汉字也是连接中国古今的重要纽带。"}, {"en": "People in modern times can read the classic works which were written by Chinese in ancient times.", "zh": "现代人能够读懂古人留下的经典典籍。"}, {"en": "The high regard for the Chinese writing system can be seen in the development of Chinese characters as an art form, known as Chinese calligraphy, which has become an important part of Chinese culture.", "zh": "人们对汉字的推崇，体现在书法这一独特艺术形式上，书法已是中华文化不可或缺的一部分。"}, {"en": "Today, the Chinese writing system is still an important part of Chinese culture.", "zh": "时至今日，汉字书写体系依旧是中华文化的核心组成。"}, {"en": "As China plays a greater role in global affairs, an increasing number of international students are beginning to appreciate China’s culture and history through this amazing language.", "zh": "随着中国在国际事务中发挥愈发重要的作用，越来越多外国学子通过这门独特的文字，领略中国的文化与历史。"}]}];

var _wl="",_wid=false,_flt=[],_units=[];
var _ti=0,_tid=false;
var _sp=false,_ca=null,_au=false;

function ua(){if(_au)return;_au=true;
try{var c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==="suspended")c.resume()}catch(e){}
try{speechSynthesis.getVoices()}catch(e){}
document.getElementById("toast").classList.add("hidden")}

function sa(){if(_ca){try{_ca.pause();_ca.currentTime=0}catch(e){};_ca=null}try{speechSynthesis.cancel()}catch(e){}}

function speakText(text,btnEl){
if(!text||_sp)return;_sp=true;ua();sa();
if(btnEl){document.querySelectorAll(".playing").forEach(function(e){e.classList.remove("playing")});btnEl.classList.add("playing")}
tryBaidu(text,btnEl)}
function tryBaidu(text,btnEl){
var a=new Audio("https://fanyi.baidu.com/gettts?lan=en&text="+encodeURIComponent(text)+"&spd=3&source=web");
_ca=a;a.volume=1;var ft=setTimeout(function(){if(_ca===a){try{a.pause();a.currentTime=0}catch(e){};tryYoudao(text,btnEl)}},2000);
a.onended=function(){clearTimeout(ft);_sp=false;if(btnEl)btnEl.classList.remove("playing")};
a.onerror=function(){clearTimeout(ft);tryYoudao(text,btnEl)};var p=a.play();if(p&&p.catch)p.catch(function(){clearTimeout(ft);tryYoudao(text,btnEl)})}
function tryYoudao(text,btnEl){
var a=new Audio("https://dict.youdao.com/dictvoice?audio="+encodeURIComponent(text)+"&type=1");
_ca=a;a.volume=1;var ft=setTimeout(function(){if(_ca===a){try{a.pause();a.currentTime=0}catch(e){};tryBrowser(text,btnEl)}},2000);
a.onended=function(){clearTimeout(ft);_sp=false;if(btnEl)btnEl.classList.remove("playing")};
a.onerror=function(){clearTimeout(ft);tryBrowser(text,btnEl)};var p=a.play();if(p&&p.catch)p.catch(function(){clearTimeout(ft);tryBrowser(text,btnEl)})}
function tryBrowser(text,btnEl){
try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=0.85;
u.onend=function(){_sp=false;if(btnEl)btnEl.classList.remove("playing")};
u.onerror=function(){tryBaidu(text,btnEl)};
speechSynthesis.speak(u)
}catch(e){tryBaidu(text,btnEl)}}
function spkSentence(w,b){if(!w||_sp)return;_sp=true;sa();if(b){document.querySelectorAll(".playing").forEach(function(e){e.classList.remove("playing")});b.classList.add("playing")}
try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.rate=0.7;u.onend=function(){_sp=false;if(b)b.classList.remove("playing")};speechSynthesis.speak(u)}catch(e){_sp=false;if(b)b.classList.remove("playing")}}

function esc(s){return s.split("'").join("&#39;")}

function showPage(n){
document.querySelectorAll(".page").forEach(function(p){p.style.display="none"});
document.getElementById("page-"+n).style.display=(n==="home"?"flex":"block");
if(n==="words")iw();if(n==="texts")it()}

function iw(){
if(_wid){rw();return;}_wid=true;
var units=[];for(var i=0;i<WORDS.length;i++){var u=WORDS[i].unit;if(units.indexOf(u)===-1)units.push(u)}
var h='<div class="tab active" data-unit="">全部</div>';
for(var i=0;i<units.length;i++){var lb=units[i].indexOf("Welcome")===0?"Welcome":"U"+units[i].match(/\d+/);h+='<div class="tab" data-unit="'+i+'">'+lb+'</div>'}
document.getElementById("word-tabs").innerHTML=h;
document.getElementById("word-count").textContent=WORDS.length;rw()}

function rw(ui,s){
if(typeof ui!=="undefined")_wl=ui;
var sr=(typeof s!=="undefined")?s:document.getElementById("word-search").value.trim();
_flt=WORDS;
if(sr){var q=sr.toLowerCase();_flt=WORDS.filter(function(d){return d.en.toLowerCase().indexOf(q)!==-1||d.def.indexOf(q)!==-1});
document.getElementById("word-count").textContent=_flt.length;
document.getElementById("word-info").textContent=' "'+sr+'"';
if(_flt.length===0){document.getElementById("word-list").innerHTML='<div class="empty">未找到匹配单词</div>';return}}
else if(_wl!==""){var units=[];for(var i=0;i<WORDS.length;i++){var u=WORDS[i].unit;if(units.indexOf(u)===-1)units.push(u)}
var targetUnit=units[parseInt(_wl)];_flt=WORDS.filter(function(d){return d.unit===targetUnit});
document.getElementById("word-count").textContent=_flt.length;
document.getElementById("word-info").textContent=targetUnit.replace("Unit ","U")}
else{document.getElementById("word-count").textContent=WORDS.length;document.getElementById("word-info").textContent="全部"}
var html="";
for(var i=0;i<_flt.length;i++){var d=_flt[i];
html+='<div class="word" data-wi="'+i+'">';
html+='<div class="en">'+d.en+' <span class="phon">'+d.phon+'</span></div>';
html+='<div class="zh">'+esc(d.def)+'</div>';
html+='<div class="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>'}
document.getElementById("word-list").innerHTML=html;
if(!sr&&typeof s==="undefined"){document.querySelectorAll("#word-tabs .tab").forEach(function(t){
t.classList.toggle("active",t.dataset.unit===_wl)})}}

function it(){
if(_tid){rt();return;}_tid=true;
var h='<div class="tab active" data-idx="0">全部</div>';
for(var i=0;i<TEXT_UNITS.length;i++){var u=TEXT_UNITS[i].unit;
var lb=(u.indexOf("Welcome")===0)?"Welcome":"Unit "+u.match(/\d+/);
h+='<div class="tab" data-idx="'+(i+1)+'">'+lb+'</div>'}
document.getElementById("text-tabs").innerHTML=h;rt()}

function rt(i){
if(typeof i!=="undefined")_ti=i;
document.querySelectorAll("#text-tabs .tab").forEach(function(t){
t.classList.toggle("active",parseInt(t.dataset.idx)===_ti)});
var html="";
if(_ti===0){for(var u=0;u<TEXT_UNITS.length;u++){var tu=TEXT_UNITS[u];
html+='<div style="font-size:16px;color:#61dafb;padding:16px 0 8px;border-bottom:1px solid #2a2a40;margin-bottom:12px">'+esc(tu.unit)+'</div>';
for(var sj=0;sj<tu.sentences.length;sj++)html+=rs(tu.sentences[sj])}}
else{var tu=TEXT_UNITS[_ti-1];for(var sj=0;sj<tu.sentences.length;sj++)html+=rs(tu.sentences[sj])}
document.getElementById("text-content").innerHTML=html}

function rs(s){
if(!s.en)return"";
if(/^\d+:\d+/.test(s.en))return'<div class="text-subtitle">'+esc(s.en)+(s.zh?" · "+esc(s.zh):"")+'</div>';
return'<div class="text-sentence" data-sen="'+esc(s.en)+
'"><div class="sen-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>'+
'<div class="sen-en">'+esc(s.en)+'</div>'+(s.zh?'<div class="sen-zh">'+esc(s.zh)+'</div>':"")+'</div>'}

function init(){
document.addEventListener("click",function(e){
var btn=e.target.closest("[data-page]");
if(btn){ua();showPage(btn.dataset.page)}});
document.getElementById("word-tabs").addEventListener("click",function(e){
var t=e.target.closest(".tab");if(!t)return;
document.getElementById("word-search").value="";var u=typeof t.dataset.unit!=="undefined"?t.dataset.unit:"";rw(u,"")});
document.getElementById("word-search").addEventListener("input",function(){rw(_wl,this.value)});
document.getElementById("word-list").addEventListener("click",function(e){
var w=e.target.closest(".word");if(!w)return;
speakText(_flt[parseInt(w.dataset.wi)].en,w.querySelector(".play"))});
document.getElementById("text-tabs").addEventListener("click",function(e){
var t=e.target.closest(".tab");if(!t)return;rt(parseInt(t.dataset.idx))});
document.getElementById("text-content").addEventListener("click",function(e){
var s=e.target.closest(".text-sentence");if(!s)return;
spkSentence(s.dataset.sen,s.querySelector(".sen-play"))});
}

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()}
</script>
</body>
</html>
